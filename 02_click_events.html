<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>jQuery Click Event</title>

    <!-- jQuery Library -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:450px;
            background:white;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h1{
            color:#333;
            margin-bottom:20px;
        }

        p{
            font-size:18px;
            color:#666;
            margin-bottom:25px;
        }

        button{
            padding:12px 25px;
            font-size:18px;
            border:none;
            border-radius:8px;
            background:#007BFF;
            color:white;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#0056b3;
            transform:scale(1.05);
        }

        #message{
            margin-top:25px;
            font-size:20px;
            color:green;
            font-weight:bold;
            display:none;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>jQuery Click Event</h1>

    <p>Click the button to see the jQuery Click Event.</p>

    <button id="btnClick">Click Me</button>

    <div id="message">
        🎉 Welcome! You clicked the button successfully.
    </div>

</div>

<script>

$(document).ready(function(){

    $("#btnClick").click(function(){

        alert("Button Clicked Successfully!");

        $("#message").fadeIn(1000);

    });

});

</script>

</body>
</html>
